{{define "layout"}}<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RandomTube Admin</title>
    <link rel="stylesheet" href="/static/css/bulma.min.css">
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
<nav class="navbar is-dark" role="navigation">
    <div class="navbar-brand">
        <a class="navbar-item has-text-weight-bold" href="/admin/">RandomTube Admin</a>
    </div>
    <div class="navbar-menu">
        <div class="navbar-start">
            <a class="navbar-item" href="/admin/">Главная</a>
            <a class="navbar-item" href="/admin/videos">Видео</a>
            <a class="navbar-item" href="/admin/categories">Категории</a>
            <a class="navbar-item" href="/admin/import">Импорт</a>
        </div>
        <div class="navbar-end">
            <div class="navbar-item">
                <a href="/" target="_blank" class="button is-small is-light">Сайт ↗</a>
            </div>
            <div class="navbar-item">
                <form action="/admin/logout" method="post">
                    <button class="button is-small is-danger">Выйти</button>
                </form>
            </div>
        </div>
    </div>
</nav>
<section class="section">
    <div class="container is-fluid">
        {{template "content" .}}
    </div>
</section>
<script src="/static/js/admin.js"></script>
</body>
</html>
{{end}}
